version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: kelsey_payroll_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: kelsey_payroll
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
